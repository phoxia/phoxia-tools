<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
<defs>
  <radialGradient id="body" cx="42%" cy="38%" r="65%">
    <stop offset="0%" stop-color="#fde68a"/><stop offset="55%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#b45309"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/><stop offset="60%" stop-color="#f59e0b" stop-opacity="0.15"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
  </radialGradient>
  <style>
    @keyframes breathe {
      0%,100% { transform: scale(1) }
      50% { transform: scale(1.04) }
    }
    @keyframes floatZ {
      0% { opacity: 0; transform: translate(0, 4px) }
      15% { opacity: 0.85 }
      70% { opacity: 0.7 }
      100% { opacity: 0; transform: translate(3px, -12px) }
    }
    .body-group { transform-box: fill-box; transform-origin: center; animation: breathe 3s cubic-bezier(0.45,0,0.55,1) infinite }
    .z-marker { transform-box: fill-box; transform-origin: center }
    .z1 { animation: floatZ 2.4s cubic-bezier(0.33,0,0.66,1) infinite }
    .z2 { animation: floatZ 2.4s cubic-bezier(0.33,0,0.66,1) infinite; animation-delay: 0.8s }
    .z3 { animation: floatZ 2.4s cubic-bezier(0.33,0,0.66,1) infinite; animation-delay: 1.6s }
    @media (prefers-reduced-motion: reduce) {
      .body-group { animation: none }
      .z-marker { animation: none; opacity: 0.4 }
    }
  </style>
</defs>
<g class="body-group">
  <circle cx="50" cy="50" r="46" fill="url(#glow)"/>
  <circle cx="50" cy="50" r="30" fill="url(#body)"/>
  <rect x="36" y="46.6" width="8" height="2.8" rx="1.4" fill="#fffaf0"/><rect x="56" y="46.6" width="8" height="2.8" rx="1.4" fill="#fffaf0"/>
</g>
<g><text class="z-marker z1" x="64" y="39" font-family="Arial,sans-serif" font-weight="700" font-size="8" fill="#fcd34d">z</text><text class="z-marker z2" x="71" y="30" font-family="Arial,sans-serif" font-weight="700" font-size="10" fill="#fcd34d">z</text><text class="z-marker z3" x="79" y="19" font-family="Arial,sans-serif" font-weight="700" font-size="13" fill="#fcd34d">z</text></g>
</svg>